name: Multi-Platform Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: POLYBIUS-II-Windows.zip
          - os: ubuntu-latest
            artifact_name: POLYBIUS-II-Linux.tar.gz
          - os: macos-latest
            artifact_name: POLYBIUS-II-macOS.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install System Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libpulse-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pypresence pyinstaller pillow

      # Windows Build
      - name: Build Executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon=icon.ico polybius.py

      # Linux Build
      - name: Build Executable (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --onedir --icon=icon.ico polybius.py

      # macOS Build
      - name: Build Executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onedir --windowed --icon=icon.ico polybius.py

      # Windows Archive
      - name: Compress Build (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist/* -DestinationPath POLYBIUS-II-Windows.zip

      # Linux Archive
      - name: Compress Build (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czvf POLYBIUS-II-Linux.tar.gz -C dist .

      # macOS Archive
      - name: Compress Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../POLYBIUS-II-macOS.zip .

      - name: Upload Assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
